<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Scrapbook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene">
        <div class="card-container" id="card-container">
            <div class="card letter" id="card-letter">
                <div class="paper-content">
                    С праздником, моя родная ♡
                    Ты - мой лучик солнца в этом сером мире ☀
                    Я хочу провести с тобой всю жизнь
                </div>
            </div>

          <div class="card calendar">
                <div class="cal-header" id="cal-month-title"></div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>

            <div class="card polaroid" id="card-polaroid">
                <div class="photo-space">
                    <img src="your-photo.jpg" style="width: 100%; height: 100%;"  alt="">
                </div>
            </div>
        </div>
        
        <div class="footer-text">
            Самой прекрасной девушке на этой планете 🌹
        </div>
    </div>

    <script src="code.js"></script>
</body>

</html>
